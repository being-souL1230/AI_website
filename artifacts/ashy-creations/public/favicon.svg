<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0530"/>
      <stop offset="100%" stop-color="#08080F"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#B06CF6"/>
      <stop offset="100%" stop-color="#F03E9E"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0"/>
      <stop offset="30%" stop-color="#F5C842"/>
      <stop offset="70%" stop-color="#F03E9E"/>
      <stop offset="100%" stop-color="#F03E9E" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6020A0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6020A0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bgGrad)"/>
  <!-- Center ambient glow -->
  <ellipse cx="90" cy="88" rx="75" ry="70" fill="url(#centerGlow)"/>

  <!-- Corner bracket TL -->
  <polyline points="22,46 22,22 46,22" stroke="#F5C842" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0.9"/>
  <!-- Corner bracket TR -->
  <polyline points="134,22 158,22 158,46" stroke="#F5C842" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0.9"/>
  <!-- Corner bracket BL -->
  <polyline points="22,134 22,158 46,158" stroke="#F03E9E" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0.9"/>
  <!-- Corner bracket BR -->
  <polyline points="134,158 158,158 158,134" stroke="#F03E9E" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0.9"/>

  <!-- Corner dots -->
  <circle cx="22" cy="22" r="3" fill="#F5C842" opacity="0.9" filter="url(#subtleGlow)"/>
  <circle cx="158" cy="22" r="3" fill="#F5C842" opacity="0.9" filter="url(#subtleGlow)"/>
  <circle cx="22" cy="158" r="3" fill="#F03E9E" opacity="0.9" filter="url(#subtleGlow)"/>
  <circle cx="158" cy="158" r="3" fill="#F03E9E" opacity="0.9" filter="url(#subtleGlow)"/>

  <!-- Subtle scan line -->
  <rect x="22" y="90" width="136" height="0.75" fill="#A855F7" opacity="0.25"/>
  <!-- Small tick marks on scan line -->
  <rect x="55" y="87" width="0.75" height="6" fill="#A855F7" opacity="0.4"/>
  <rect x="90" y="87" width="0.75" height="6" fill="#A855F7" opacity="0.4"/>
  <rect x="125" y="87" width="0.75" height="6" fill="#A855F7" opacity="0.4"/>

  <!-- AY text -->
  <text
    x="90"
    y="115"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
    font-size="72"
    font-weight="900"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="-3"
  >AY</text>

  <!-- Underline accent bar -->
  <rect x="38" y="123" width="104" height="2.5" rx="1.25" fill="url(#lineGrad)" opacity="0.85"/>

  <!-- Small decorative dots on underline ends -->
  <circle cx="38" cy="124.25" r="2.5" fill="#F5C842" opacity="0.7"/>
  <circle cx="142" cy="124.25" r="2.5" fill="#F03E9E" opacity="0.7"/>
</svg>
