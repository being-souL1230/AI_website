kind = "web"
previewPath = "/"
title = "AshY Creations"
version = "1.0.0"
id = "artifacts/ashy-creations"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24195

[services.development]
run = "pnpm --filter @workspace/ashy-creations run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ashy-creations", "run", "build" ]
publicDir = "artifacts/ashy-creations/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24195"
BASE_PATH = "/"
